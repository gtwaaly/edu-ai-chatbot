<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 智能客服 · 教育培训助手</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2230;
    --border: #2a2f40;
    --accent: #4f8ef7;
    --accent2: #7c5cfc;
    --text: #e8eaf0;
    --text2: #8890a8;
    --user-bubble: #1a2a4a;
    --bot-bubble: #1a1e2e;
    --success: #3dd68c;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Serif SC', serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* 顶部栏 */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .brand-name {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.03em;
  }

  .brand-sub {
    font-size: 11px;
    color: var(--text2);
    font-family: 'JetBrains Mono', monospace;
  }

  .status-dot {
    width: 8px; height: 8px;
    background: var(--success);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--success);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* 文档上传区 */
  .upload-bar {
    padding: 12px 24px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .upload-label {
    font-size: 12px;
    color: var(--text2);
    font-family: 'JetBrains Mono', monospace;
    white-space: nowrap;
  }

  .upload-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text2);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'JetBrains Mono', monospace;
  }

  .upload-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  #file-input { display: none; }

  .doc-tag {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    background: rgba(79,142,247,0.1);
    border: 1px solid rgba(79,142,247,0.3);
    border-radius: 6px;
    font-size: 11px;
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
  }

  .doc-tag .remove {
    cursor: pointer;
    opacity: 0.6;
    transition: opacity 0.2s;
  }

  .doc-tag .remove:hover { opacity: 1; }

  /* 聊天区域 */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* 欢迎提示 */
  .welcome {
    text-align: center;
    padding: 40px 20px;
    animation: fadeIn 0.6s ease;
  }

  .welcome-icon {
    font-size: 48px;
    margin-bottom: 16px;
  }

  .welcome h2 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .welcome p {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.8;
    max-width: 400px;
    margin: 0 auto 24px;
  }

  .quick-questions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    max-width: 500px;
    margin: 0 auto;
  }

  .quick-q {
    padding: 8px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.2s;
  }

  .quick-q:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(79,142,247,0.05);
  }

  /* 消息气泡 */
  .msg {
    display: flex;
    gap: 10px;
    animation: slideUp 0.3s ease;
    max-width: 800px;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .msg.user { flex-direction: row-reverse; align-self: flex-end; }
  .msg.bot { align-self: flex-start; }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .msg.user .avatar {
    background: linear-gradient(135deg, #2a4a8a, #1a3060);
  }

  .msg.bot .avatar {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
  }

  .bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.7;
    max-width: 600px;
  }

  .msg.user .bubble {
    background: var(--user-bubble);
    border: 1px solid rgba(79,142,247,0.2);
    border-top-right-radius: 4px;
  }

  .msg.bot .bubble {
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }

  /* 加载动画 */
  .typing {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 14px 16px;
  }

  .typing span {
    width: 6px; height: 6px;
    background: var(--text2);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* 输入区域 */
  .input-area {
    padding: 16px 24px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    transition: border-color 0.2s;
  }

  .input-row:focus-within {
    border-color: var(--accent);
  }

  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 14px;
    font-family: 'Noto Serif SC', serif;
    resize: none;
    min-height: 22px;
    max-height: 120px;
    line-height: 1.6;
  }

  textarea::placeholder { color: var(--text2); }

  .send-btn {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s, transform 0.1s;
    font-size: 16px;
  }

  .send-btn:hover { opacity: 0.85; }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .hint {
    font-size: 11px;
    color: var(--text2);
    text-align: center;
    margin-top: 10px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* API Key 设置弹窗 */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    backdrop-filter: blur(4px);
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 32px;
    width: 90%;
    max-width: 440px;
    animation: fadeIn 0.3s ease;
  }

  .modal h3 {
    font-size: 18px;
    margin-bottom: 8px;
  }

  .modal p {
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 20px;
    line-height: 1.7;
  }

  .modal input {
    width: 100%;
    padding: 12px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    outline: none;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }

  .modal input:focus { border-color: var(--accent); }

  .modal-btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 14px;
    font-family: 'Noto Serif SC', serif;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .modal-btn:hover { opacity: 0.85; }

  .settings-icon {
    cursor: pointer;
    color: var(--text2);
    transition: color 0.2s;
    font-size: 18px;
  }

  .settings-icon:hover { color: var(--accent); }
</style>
</head>
<body>

<!-- API Key 设置弹窗 -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>🔑 设置 MiMo API Key</h3>
    <p>请输入你的 Xiaomi MiMo API Key，密钥仅保存在本地浏览器中，不会上传至任何服务器。</p>
    <input type="password" id="api-key-input" placeholder="sk-xxxxxxxxxxxxxxxxxxxxxxxx" />
    <button class="modal-btn" onclick="saveApiKey()">开始使用 →</button>
  </div>
</div>

<!-- 顶部栏 -->
<header>
  <div class="brand">
    <div class="logo">🎓</div>
    <div>
      <div class="brand-name">教育培训 · AI 智能客服</div>
      <div class="brand-sub">Powered by Xiaomi MiMo</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <div class="status-dot"></div>
    <span style="font-size:12px;color:var(--text2);font-family:'JetBrains Mono',monospace;">在线</span>
    <span class="settings-icon" onclick="openSettings()" title="设置 API Key">⚙️</span>
  </div>
</header>

<!-- 文档上传栏 -->
<div class="upload-bar">
  <span class="upload-label">📎 知识库文档：</span>
  <button class="upload-btn" onclick="document.getElementById('file-input').click()">
    ＋ 上传文档
  </button>
  <input type="file" id="file-input" accept=".txt,.md" multiple onchange="handleFiles(this.files)" />
  <div id="doc-tags"></div>
</div>

<!-- 聊天区域 -->
<div class="chat-area" id="chat">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">🤖</div>
    <h2>你好，我是 AI 智能客服</h2>
    <p>我可以根据你上传的课程资料，自动回答学员关于课程内容、报名流程、价格等常见问题。</p>
    <div class="quick-questions">
      <div class="quick-q" onclick="askQuick(this)">课程有哪些？</div>
      <div class="quick-q" onclick="askQuick(this)">如何报名？</div>
      <div class="quick-q" onclick="askQuick(this)">价格是多少？</div>
      <div class="quick-q" onclick="askQuick(this)">上课时间怎么安排？</div>
      <div class="quick-q" onclick="askQuick(this)">有没有试听课？</div>
    </div>
  </div>
</div>

<!-- 输入区域 -->
<div class="input-area">
  <div class="input-row">
    <textarea id="user-input" placeholder="输入你的问题，按 Enter 发送..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
  </div>
  <div class="hint">由 Xiaomi MiMo 驱动 · 知识库内容以上传文档为准</div>
</div>

<script>
  let apiKey = localStorage.getItem('mimo_api_key') || '';
  let docContents = [];
  let chatHistory = [];

  // 初始化
  window.onload = () => {
    if (apiKey) document.getElementById('modal').style.display = 'none';
  };

  function saveApiKey() {
    const key = document.getElementById('api-key-input').value.trim();
    if (!key) return alert('请输入 API Key');
    apiKey = key;
    localStorage.setItem('mimo_api_key', key);
    document.getElementById('modal').style.display = 'none';
  }

  function openSettings() {
    document.getElementById('api-key-input').value = apiKey;
    document.getElementById('modal').style.display = 'flex';
  }

  // 文件上传处理
  function handleFiles(files) {
    Array.from(files).forEach(file => {
      const reader = new FileReader();
      reader.onload = e => {
        docContents.push({ name: file.name, content: e.target.result });
        addDocTag(file.name, docContents.length - 1);
      };
      reader.readAsText(file);
    });
  }

  function addDocTag(name, idx) {
    const tags = document.getElementById('doc-tags');
    const tag = document.createElement('div');
    tag.className = 'doc-tag';
    tag.id = `tag-${idx}`;
    tag.innerHTML = `📄 ${name} <span class="remove" onclick="removeDoc(${idx})">✕</span>`;
    tags.appendChild(tag);
  }

  function removeDoc(idx) {
    docContents[idx] = null;
    const tag = document.getElementById(`tag-${idx}`);
    if (tag) tag.remove();
  }

  // 快捷问题
  function askQuick(el) {
    document.getElementById('user-input').value = el.textContent;
    sendMessage();
  }

  // 自动调整高度
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  // 发送消息
  async function sendMessage() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text) return;
    if (!apiKey) { openSettings(); return; }

    // 隐藏欢迎界面
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    input.value = '';
    input.style.height = 'auto';

    appendMsg('user', text);
    chatHistory.push({ role: 'user', content: text });

    const btn = document.getElementById('send-btn');
    btn.disabled = true;

    const typingId = appendTyping();

    try {
      // 构建系统提示
      const docs = docContents.filter(Boolean);
      let systemPrompt = `你是一个教育培训机构的 AI 智能客服助手，专业、友好、简洁地回答学员的问题。`;
      if (docs.length > 0) {
        systemPrompt += `\n\n以下是机构的知识库资料，请优先根据这些内容回答：\n\n`;
        docs.forEach(d => {
          systemPrompt += `【${d.name}】\n${d.content}\n\n`;
        });
        systemPrompt += `如果问题超出知识库范围，请告知学员联系人工客服。`;
      } else {
        systemPrompt += `\n请友好地回答关于教育培训的常见问题，如课程介绍、报名流程、价格咨询等。如需具体信息，建议学员联系人工客服。`;
      }

      const response = await fetch('https://api.xiaomimimo.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: 'mimo-v2-pro',
          messages: [
            { role: 'system', content: systemPrompt },
            ...chatHistory
          ],
          max_tokens: 800,
          temperature: 0.7
        })
      });

      const data = await response.json();
      removeTyping(typingId);

      if (data.choices && data.choices[0]) {
        const reply = data.choices[0].message.content;
        appendMsg('bot', reply);
        chatHistory.push({ role: 'assistant', content: reply });
      } else {
        appendMsg('bot', '抱歉，请求出现问题：' + (data.error?.message || '未知错误'));
      }
    } catch (err) {
      removeTyping(typingId);
      appendMsg('bot', '⚠️ 网络错误，请检查 API Key 是否正确，或稍后重试。');
    }

    btn.disabled = false;
    scrollBottom();
  }

  function appendMsg(role, text) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = `
      <div class="avatar">${role === 'user' ? '👤' : '🤖'}</div>
      <div class="bubble">${text.replace(/\n/g, '<br>')}</div>
    `;
    chat.appendChild(div);
    scrollBottom();
    return div;
  }

  function appendTyping() {
    const chat = document.getElementById('chat');
    const id = 'typing-' + Date.now();
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.id = id;
    div.innerHTML = `
      <div class="avatar">🤖</div>
      <div class="bubble">
        <div class="typing"><span></span><span></span><span></span></div>
      </div>
    `;
    chat.appendChild(div);
    scrollBottom();
    return id;
  }

  function removeTyping(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  function scrollBottom() {
    const chat = document.getElementById('chat');
    chat.scrollTop = chat.scrollHeight;
  }
</script>
</body>
</html>
